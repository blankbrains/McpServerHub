<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- 背景圆 -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- 中心 MCP 字母 -->
  <text x="256" y="280" text-anchor="middle" fill="white" font-size="180" font-weight="800" font-family="system-ui,-apple-system,sans-serif">
    M
  </text>
  <!-- 底部连接线（表示 MCP 协议连接） -->
  <path d="M136,380 Q256,440 376,380" stroke="white" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M156,400 Q256,450 356,400" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.25"/>
  <!-- 节点小点 -->
  <circle cx="136" cy="380" r="8" fill="white" opacity="0.6"/>
  <circle cx="376" cy="380" r="8" fill="white" opacity="0.6"/>
</svg>
