<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- 外圈 -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="27" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1.5"/>
  <!-- 中心六边形底板 -->
  <circle cx="32" cy="32" r="16" fill="white" fill-opacity="0.12"/>
  <!-- M 字母 -->
  <text x="32" y="34" text-anchor="middle" dominant-baseline="central"
        fill="white" font-size="24" font-weight="700"
        font-family="system-ui,-apple-system,sans-serif">M</text>
  <!-- 底部连接短横线（Hub 含义） -->
  <line x1="20" y1="48" x2="44" y2="48" stroke="white" stroke-opacity="0.3" stroke-width="2" stroke-linecap="round"/>
</svg>
