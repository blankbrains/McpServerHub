[loggers]
keys=root, mcp_hub

[handlers]
keys=console, file

[formatters]
keys=json

[logger_root]
level=INFO
handlers=console, file

[logger_mcp_hub]
level=DEBUG
handlers=console, file
qualname=mcp_hub
propagate=0

[handler_console]
class=StreamHandler
level=INFO
formatter=json
args=(sys.stdout,)

[handler_file]
class=handlers.RotatingFileHandler
level=DEBUG
formatter=json
args=('%(log_dir)s/mcp-hub.log', 'a', 10485760, 10)

[formatter_json]
class=pythonjsonlogger.jsonlogger.JsonFormatter
format=%(asctime)s %(name)s %(levelname)s %(message)s
